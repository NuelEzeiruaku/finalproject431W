<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HelpDesk Welcome Page</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7fafc; padding: 40px; }
    .card {
      max-width: 720px; margin: 0 auto; background: white; border: 1px solid #ddd;
      border-radius: 12px; padding: 24px; box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }
    h2 { margin-top: 0; color: #b45309; }
    p { line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Welcome HelpDesk</h2>
    <p><strong>Email:</strong> {{ email }}</p>
    <p>This is the helpdesk-specific welcome page shown after a successful login.</p>
  </div>
</body>
</html>
