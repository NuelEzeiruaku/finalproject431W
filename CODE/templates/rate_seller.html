{% extends "base.html" %}
{% block title %}Rate Seller – NittanyAuction{% endblock %}
{% block content %}
<div style="max-width:440px;margin:0 auto;">
  <div class="card">
    <h2>⭐ Rate this Seller</h2>
    <p class="text-muted" style="margin-bottom:20px;">{{ listing.auction_title }}</p>
    <form method="post">
      <div class="form-group">
        <label>Your Rating *</label>
        <div style="display:flex;gap:12px;margin-top:8px;">
          {% for s in [1,2,3,4,5] %}
          <label style="cursor:pointer;text-align:center;">
            <input type="radio" name="rating" value="{{ s }}" required
                   style="display:block;margin:0 auto 4px;">
            {{ s }}★
          </label>
          {% endfor %}
        </div>
      </div>
      <div class="form-group">
        <label>Comments (optional)</label>
        <textarea name="rating_desc" rows="3"
          style="width:100%;padding:9px 12px;border:1px solid #d1d5db;
                 border-radius:8px;font-size:.95rem;resize:vertical;"></textarea>
      </div>
      <div style="display:flex;gap:12px;margin-top:16px;">
        <button type="submit" class="btn btn-primary">Submit Rating</button>
        <a href="{{ url_for('my_bids') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
