{% extends "base.html" %}
{% block title %}Login – NittanyAuction{% endblock %}
{% block content %}
<div style="max-width:440px;margin:0 auto;">
  <div class="card">
    <h2>Sign in to NittanyAuction</h2>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label for="email">Email address</label>
        <input id="email" type="text" name="email" placeholder="you@lsu.edu" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">
        Log in
      </button>
    </form>

    <p class="text-muted text-center mt-2">
      Don't have an account?
      <a href="{{ url_for('register') }}">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
