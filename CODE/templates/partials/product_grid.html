<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;">
  {% for p in products %}
  <a href="{{ url_for('product_detail', seller_email=p.seller_email, listing_id=p.listing_id) }}"
     style="display:block;border:1px solid #e2e8f0;border-radius:10px;padding:16px;
            text-decoration:none;color:inherit;transition:box-shadow .15s;">
    <p style="font-size:.75rem;color:#9ca3af;margin-bottom:4px;">{{ p.category }}</p>
    <p style="font-weight:700;color:#1e3a5f;margin-bottom:8px;line-height:1.3;">
      {{ p.auction_title }}
    </p>
    <p style="font-size:1.1rem;font-weight:bold;color:#059669;margin-bottom:4px;">
      {% if p.top_bid %}${{ "%.2f"|format(p.top_bid) }}{% else %}No bids{% endif %}
    </p>
    <p style="font-size:.8rem;color:#6b7280;">
      Reserve ${{ "%.2f"|format(p.reserve_price) }}
      · {{ p.bid_count }}/{{ p.max_bids }} bids
    </p>
  </a>
  {% endfor %}
</div>
